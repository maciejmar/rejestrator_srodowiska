# ── Dodaj do konfiguracji wspólnego nginx-a ─────────────────────────────────
# portal-ai.bank.com.pl

# Angular frontend – /rezerwacje/
location /rezerwacje/ {
    proxy_pass         http://portal-ai-rezerwacje:80/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

# FastAPI backend – /api/
location /api/ {
    proxy_pass         http://portal-ai-api:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Przekaż dane zalogowanego usera jeśli masz auth_request / Authelia
    # proxy_set_header X-Remote-User  $upstream_http_remote_user;
    # proxy_set_header X-Remote-Email $upstream_http_remote_email;
}

# Swagger UI FastAPI (dev/admin)
location /api/docs {
    proxy_pass http://portal-ai-api:8000/docs;
}
