services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: repo.bank.com.pl/zrai-docker-remote-dev/postgres:16
    container_name: portal-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       portalai
      POSTGRES_USER:     portalai
      POSTGRES_PASSWORD: portalai
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    networks:
      - internal

  # ── FastAPI backend ───────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      secrets:
        - pip_conf
    container_name: portal-ai-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://portalai:portalai@db:5432/portalai
    ports:
      - "10.112.32.19:8004:8000"
    depends_on:
      - db
    networks:
      - internal

  # ── Angular frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      secrets:
        - ca_cert
    container_name: portal-ai-rezerwacje
    restart: unless-stopped
    ports:
      - "10.112.32.19:8002:80"

volumes:
  pg_data:

networks:
  internal:
    # Sieć wewnętrzna: frontend nie ma bezpośredniego dostępu do DB
    driver: bridge

secrets:
  pip_conf:
    file: /etc/pip.conf
  ca_cert:
    file: /etc/pki/ca-trust/source/anchors/bank-jfrog-ca.crt
