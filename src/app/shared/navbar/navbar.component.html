<header class="navbar" *ngIf="currentUser">
  <div class="navbar__brand" (click)="navigate('user')" role="button" tabindex="0">
    <img src="assets/logo-bgk.svg" alt="Bank Gospodarstwa Krajowego" class="navbar__logo" />
    <div class="navbar__divider"></div>
    <div class="navbar__title">
      <span class="navbar__title-main">Portal AI</span>
      <span class="navbar__title-sub">Rezerwacja Modeli</span>
    </div>
  </div>

  <nav class="navbar__tabs">
    <button
      class="navbar__tab"
      [class.navbar__tab--active]="isActive('user')"
      (click)="navigate('user')"
    >
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      Użytkownik
    </button>

    <button
      *ngIf="currentUser.role === 'admin'"
      class="navbar__tab"
      [class.navbar__tab--active]="isActive('admin')"
      (click)="navigate('admin')"
    >
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      Administrator
    </button>
  </nav>

  <div class="navbar__right">
    <div class="navbar__user">
      <div class="navbar__avatar">{{ currentUser.displayName.charAt(0).toUpperCase() }}</div>
      <div class="navbar__user-info">
        <span class="navbar__user-name">{{ currentUser.displayName }}</span>
        <span class="navbar__role-badge" [class.navbar__role-badge--admin]="currentUser.role === 'admin'">
          {{ currentUser.role === 'admin' ? 'Administrator' : 'Użytkownik' }}
        </span>
      </div>
    </div>

    <button class="navbar__logout" (click)="logout()" title="Wyloguj">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>

    <div class="navbar__env">
      <span class="navbar__env-dot"></span>
      10.112.32.19
    </div>
  </div>
</header>

<!-- Navbar is hidden on login page (no currentUser) -->
