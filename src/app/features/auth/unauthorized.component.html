<div class="unauth-page">
  <div class="unauth-card scale-in">

    <div class="unauth-card__logo">
      <img src="assets/logo-bgk.svg" alt="Bank Gospodarstwa Krajowego" />
    </div>

    <div class="unauth-card__divider"></div>

    <div class="unauth-card__icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>

    <h1 class="unauth-card__title">Brak dostępu</h1>
    <p class="unauth-card__msg">
      Nie jesteś zalogowany w portalu lub Twoja sesja wygasła.<br>
      Zaloguj się przez portal, aby uzyskać dostęp do aplikacji.
    </p>

    <button class="btn btn--primary btn--lg" (click)="goToPortal()">
      Przejdź do logowania
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </button>

    <div class="unauth-card__server">
      <span class="dot"></span>
      10.112.32.19 · portal-ai.bank.com.pl
    </div>
  </div>
</div>
